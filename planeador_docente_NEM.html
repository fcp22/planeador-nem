<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Planeador Docente NEM — Fase 6</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f0f7ff;
            padding: 16px;
            color: #1e293b;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            padding: 24px 20px;
            margin-bottom: 24px;
            border: 1px solid #e2e8f0;
        }

        .header {
            background: linear-gradient(135deg, #0b3b5f, #1e4a76);
            color: white;
            border-radius: 28px;
            padding: 24px 20px;
            margin-bottom: 24px;
            text-align: center;
        }

        .header h1 {
            font-size: 1.7rem;
            margin-bottom: 6px;
        }

        .header p {
            opacity: 0.9;
            font-size: 0.9rem;
        }

        h2 {
            font-size: 1.4rem;
            color: #0c4a6e;
            margin-bottom: 16px;
            border-left: 5px solid #2c7da0;
            padding-left: 14px;
        }

        label {
            font-weight: 600;
            display: block;
            margin-top: 12px;
            margin-bottom: 5px;
            font-size: 0.85rem;
            color: #2c3e66;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 14px;
            border-radius: 16px;
            border: 1px solid #cbd5e1;
            background: #ffffff;
            font-size: 0.9rem;
            font-family: inherit;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #2c7da0;
            box-shadow: 0 0 0 3px rgba(44,125,160,0.2);
        }

        button {
            background: #1e4a76;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }

        button:hover {
            background: #0f3b5f;
        }

        .btn-sec {
            background: #e2e8f0;
            color: #1e293b;
            margin-top: 8px;
        }

        .flex-btns {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .flex-btns button {
            flex: 1;
        }

        .result-area {
            background: #f8fafc;
            border-radius: 20px;
            padding: 20px;
            white-space: pre-wrap;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            max-height: 500px;
            overflow-y: auto;
            border: 1px solid #cbd5e1;
            line-height: 1.5;
        }
    </style>
</head>
<body>
<div class="container" id="app"></div>

<script>
    // ======================= DATOS BASE =======================
    const CAMPOS = ["Lenguajes", "Saberes y pensamiento científico", "Ética, naturaleza y sociedades", "De lo humano y lo comunitario"];
    const ASIGNATURAS_POR_CAMPO = {
        "Lenguajes": ["Español", "Inglés", "Artes", "Lengua indígena"],
        "Saberes y pensamiento científico": ["Matemáticas", "Biología", "Física", "Química"],
        "Ética, naturaleza y sociedades": ["Formación Cívica y Ética", "Historia", "Geografía"],
        "De lo humano y lo comunitario": ["Tutoría", "Vida saludable", "Educación socioemocional"]
    };
    const GRADOS = ["1", "2", "3"];
    const TRIMESTRES = ["Primer trimestre", "Segundo trimestre", "Tercer trimestre"];
    const METODOLOGIAS = ["Aprendizaje basado en proyectos comunitarios", "Aprendizaje basado en indagación", "Aprendizaje basado en problemas", "Aprendizaje servicio"];
    const EJES_ARTICULADORES = ["Inclusión", "Pensamiento crítico", "Interculturalidad crítica", "Igualdad de género", "Vida saludable", "Artes y experiencias estéticas"];
    const PERFILES_EGRESO = ["Reconoce y valora expresiones culturales", "Argumenta juicios éticos", "Comunica ideas con claridad", "Resuelve problemas mediante pensamiento científico", "Participa en proyectos comunitarios"];

    const PDA_POR_ASIGNATURA = {
        "Español": ["Prácticas sociales del lenguaje: debates y diálogos argumentados", "Análisis de textos literarios", "Producción de textos expositivos"],
        "Matemáticas": ["Resolución de problemas mediante modelación matemática", "Interpretación de datos estadísticos", "Pensamiento algebraico"],
        "Biología": ["Ecosistemas locales y sustentabilidad", "Salud integral y prevención"],
        "Historia": ["Identidad cultural y memoria histórica", "Pensamiento histórico"],
        "Formación Cívica y Ética": ["Ejercicio de la ciudadanía", "Dilemas éticos y acuerdos en el aula"]
    };

    function obtenerPDAs(asignatura) {
        return PDA_POR_ASIGNATURA[asignatura] || ["Desarrollo de pensamiento crítico", "Fortalecimiento de saberes comunitarios"];
    }

    // ======================= ESTADO =======================
    let S = {
        step: 1, user: null, escuela: "", cct: "", turno: "Matutino", municipio: "",
        campo: "", asig: "", grado: "", trimestre: "Primer trimestre", met: "", contexto: "",
        pdaSeleccionados: [], ejes: [], pe: [], proyecto: "", docTipo: "", resultado: "", gen: false
    };

    function R() {
        const app = document.getElementById("app");
        if (!S.user) { app.innerHTML = renderLogin(); bindLogin(); return; }
        if (S.step === 1) app.innerHTML = renderStep1();
        else if (S.step === 2) app.innerHTML = renderStep2();
        else if (S.step === 3) app.innerHTML = renderStep3();
        else if (S.step === 4) app.innerHTML = renderStep4();
        else if (S.step === 5) app.innerHTML = renderStep5();
        else if (S.step === 6) app.innerHTML = renderResultado();
        bindEvents();
    }

    function renderLogin() {
        return `<div class="card"><div class="header"><h1>📘 Planeador Docente NEM — Fase 6</h1><p>Secundaria | Nueva Escuela Mexicana 2025-2026</p></div>
        <div class="card"><h2>🔐 Acceso docente</h2>
        <label>Usuario</label><input type="text" id="username" placeholder="Ej: maestra01">
        <label>Contraseña</label><input type="password" id="password" placeholder="Contraseña">
        <button id="btnLogin">Ingresar</button>
        <p style="margin-top:16px;font-size:0.7rem;text-align:center;">Demo: maestra01 / 123456 | admin / admin2025</p></div></div>`;
    }

    function bindLogin() {
        document.getElementById("btnLogin")?.addEventListener("click", () => {
            const u = document.getElementById("username").value;
            const p = document.getElementById("password").value;
            if ((u === "maestra01" || u === "maestro02" || u === "maestra03") && p === "123456") {
                S.user = { nombre: u === "maestra01" ? "Docente 01" : (u === "maestro02" ? "Docente 02" : "Docente 03") };
                S.step = 1; R();
            } else if (u === "admin" && p === "admin2025") {
                S.user = { nombre: "Administrador" }; S.step = 1; R();
            } else alert("Credenciales incorrectas");
        });
    }

    function renderStep1() {
        return `<div class="card"><div class="header"><h1>📌 Paso 1/5 — Datos de la escuela</h1></div>
        <label>🏫 Nombre de la escuela</label><input type="text" id="escuela" value="${S.escuela}">
        <label>📛 CCT</label><input type="text" id="cct" value="${S.cct}">
        <label>⏰ Turno</label><select id="turno">${["Matutino","Vespertino"].map(t=>`<option ${S.turno===t?"selected":""}>${t}</option>`)}</select>
        <label>📍 Municipio</label><input type="text" id="municipio" value="${S.municipio}">
        <button id="next1">Continuar →</button></div>`;
    }

    function renderStep2() {
        return `<div class="card"><div class="header"><h1>📖 Paso 2/5 — Campo y asignatura</h1></div>
        <label>🌿 Campo formativo</label><select id="campo">${CAMPOS.map(c=>`<option ${S.campo===c?"selected":""}>${c}</option>`)}</select>
        <label>📚 Asignatura</label><select id="asig">${(ASIGNATURAS_POR_CAMPO[S.campo]||ASIGNATURAS_POR_CAMPO["Lenguajes"]).map(a=>`<option ${S.asig===a?"selected":""}>${a}</option>`)}</select>
        <label>🎓 Grado</label><select id="grado">${GRADOS.map(g=>`<option ${S.grado===g?"selected":""}>${g}°</option>`)}</select>
        <label>📅 Trimestre</label><select id="trimestre">${TRIMESTRES.map(t=>`<option ${S.trimestre===t?"selected":""}>${t}</option>`)}</select>
        <button id="next2">Continuar →</button></div>`;
    }

    function renderStep3() {
        const pdas = obtenerPDAs(S.asig);
        return `<div class="card"><div class="header"><h1>🎯 Paso 3/5 — PDA y ejes</h1></div>
        <label>📌 PDA (selecciona al menos 2)</label>
        ${pdas.map(p=>`<div><label><input type="checkbox" value="${p}" ${S.pdaSeleccionados.includes(p)?"checked":""}> ${p}</label></div>`).join("")}
        <label>🧩 Ejes articuladores</label>
        ${EJES_ARTICULADORES.map(e=>`<div><label><input type="checkbox" class="eje" value="${e}" ${S.ejes.includes(e)?"checked":""}> ${e}</label></div>`).join("")}
        <label>🎯 Perfiles de egreso</label>
        ${PERFILES_EGRESO.map(p=>`<div><label><input type="checkbox" class="pe" value="${p}" ${S.pe.includes(p)?"checked":""}> ${p}</label></div>`).join("")}
        <button id="next3">Continuar →</button></div>`;
    }

    function renderStep4() {
        return `<div class="card"><div class="header"><h1>🌎 Paso 4/5 — Contexto</h1></div>
        <label>📖 Contexto comunitario</label><textarea rows="3" id="contexto">${S.contexto}</textarea>
        <label>🛠️ Metodología</label><select id="met">${METODOLOGIAS.map(m=>`<option ${S.met===m?"selected":""}>${m}</option>`)}</select>
        <label>💡 Proyecto</label><input type="text" id="proyecto" value="${S.proyecto}">
        <button id="next4">Continuar →</button></div>`;
    }

    function renderStep5() {
        return `<div class="card"><div class="header"><h1>📄 Paso 5/5 — Generar</h1></div>
        <button id="genAnalitico">📘 Programa Analítico Anual</button>
        <button id="genDidactico">🗂️ Plano Didáctico (F1,F2,F3)</button>
        <button id="backStep" class="btn-sec">◀ Regresar</button></div>`;
    }

    function renderResultado() {
        return `<div class="card"><div class="header"><h1>✅ Documento generado</h1></div>
        <div class="result-area" id="textoResultado">${S.resultado || "Generando..."}</div>
        <div class="flex-btns"><button id="descargarWord">📎 Descargar Word</button><button id="copiarTexto">📋 Copiar</button><button id="nuevoDoc">🔄 Nuevo</button></div></div>`;
    }

    // ======================= GEMINI CORREGIDO - USANDO gemini-2.5-flash =======================
    async function generarConGemini(datosFormulario, tipoDocumento) {
        const GEMINI_KEY = "AIzaSyDALopmFHobLJkYsyHnQdx58641IqyMwb8";
        // ✅ MODELO CORRECTO que SÍ funciona gratis
        const MODELO = "gemini-2.5-flash";
        
        const prompt = `Eres un experto en Nueva Escuela Mexicana (NEM), Fase 6 de secundaria.
Genera un documento educativo oficial llamado "${tipoDocumento}" con estos datos:
${JSON.stringify(datosFormulario, null, 2)}
Requisitos: formato oficial NEM, lenguaje claro, incluye todos los planos y fases.`;

        try {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODELO}:generateContent?key=${GEMINI_KEY}`;
            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: { maxOutputTokens: 8192, temperature: 0.7 }
                })
            });
            const data = await response.json();
            if (data.error) return "Error: " + data.error.message;
            return data.candidates?.[0]?.content?.parts?.[0]?.text || "No se pudo generar.";
        } catch (error) {
            return "Error de conexión: " + error.message;
        }
    }

    async function generarYMostrar() {
        S.step = 6;
        R();
        const datos = {
            escuela: S.escuela, cct: S.cct, turno: S.turno, municipio: S.municipio,
            campo: S.campo, asignatura: S.asig, grado: S.grado, trimestre: S.trimestre,
            metodologia: S.met, contexto: S.contexto, proyecto: S.proyecto,
            pda: S.pdaSeleccionados, ejes: S.ejes, perfiles: S.pe
        };
        S.resultado = await generarConGemini(datos, S.docTipo);
        R();
    }

    function bindEvents() {
        if (S.step === 1) document.getElementById("next1")?.addEventListener("click", () => {
            S.escuela = document.getElementById("escuela").value;
            S.cct = document.getElementById("cct").value;
            S.turno = document.getElementById("turno").value;
            S.municipio = document.getElementById("municipio").value;
            if (!S.escuela) { alert("Escribe el nombre de la escuela"); return; }
            S.step = 2; R();
        });
        if (S.step === 2) document.getElementById("next2")?.addEventListener("click", () => {
            S.campo = document.getElementById("campo").value;
            S.asig = document.getElementById("asig").value;
            S.grado = document.getElementById("grado").value.replace("°", "");
            S.trimestre = document.getElementById("trimestre").value;
            S.step = 3; R();
        });
        if (S.step === 3) document.getElementById("next3")?.addEventListener("click", () => {
            S.pdaSeleccionados = Array.from(document.querySelectorAll("input[type='checkbox']:not(.eje):not(.pe)")).filter(c=>c.checked).map(c=>c.value);
            S.ejes = Array.from(document.querySelectorAll(".eje:checked")).map(c=>c.value);
            S.pe = Array.from(document.querySelectorAll(".pe:checked")).map(c=>c.value);
            if (S.pdaSeleccionados.length < 1) { alert("Selecciona al menos un PDA"); return; }
            S.step = 4; R();
        });
        if (S.step === 4) document.getElementById("next4")?.addEventListener("click", () => {
            S.contexto = document.getElementById("contexto").value;
            S.met = document.getElementById("met").value;
            S.proyecto = document.getElementById("proyecto").value;
            S.step = 5; R();
        });
        if (S.step === 5) {
            document.getElementById("genAnalitico")?.addEventListener("click", () => { S.docTipo = "Programa Analítico Anual"; generarYMostrar(); });
            document.getElementById("genDidactico")?.addEventListener("click", () => { S.docTipo = "Plano Didáctico"; generarYMostrar(); });
            document.getElementById("backStep")?.addEventListener("click", () => { if(S.step>1) S.step--; R(); });
        }
        if (S.step === 6) {
            document.getElementById("descargarWord")?.addEventListener("click", () => {
                const blob = new Blob([S.resultado], {type: "application/msword"});
                const a = document.createElement("a");
                a.href = URL.createObjectURL(blob);
                a.download = `${S.docTipo.replace(/\s/g,"_")}.doc`;
                a.click();
            });
            document.getElementById("copiarTexto")?.addEventListener("click", () => { navigator.clipboard.writeText(S.resultado); alert("Copiado"); });
            document.getElementById("nuevoDoc")?.addEventListener("click", () => { S.step = 1; S.resultado = ""; R(); });
        }
    }

    R();
</script>
</body>
</html>
