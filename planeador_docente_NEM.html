<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planeador Docente NEM</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:Arial,sans-serif;background:#f0f7ff;padding:16px;}
        .container{max-width:1000px;margin:0 auto;}
        .card{background:white;border-radius:20px;padding:20px;margin-bottom:20px;box-shadow:0 4px 10px rgba(0,0,0,0.1);}
        .header{background:#0b3b5f;color:white;border-radius:20px;padding:20px;text-align:center;margin-bottom:20px;}
        h1{font-size:1.5rem;}
        h2{color:#0b3b5f;margin-bottom:15px;}
        label{font-weight:bold;display:block;margin-top:12px;margin-bottom:5px;}
        input,select,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid #ccc;}
        button{background:#0b3b5f;color:white;border:none;padding:12px;border-radius:30px;font-weight:bold;cursor:pointer;width:100%;margin-top:15px;}
        button:hover{background:#1e4a76;}
        .result-area{background:#f4f4f4;padding:15px;border-radius:10px;max-height:500px;overflow:auto;white-space:pre-wrap;}
        .flex-btns{display:flex;gap:10px;margin-top:15px;}
        .flex-btns button{flex:1;}
    </style>
</head>
<body>
<div class="container" id="app"></div>

<script>
    let S = {
        step: 1,
        user: null,
        escuela: "", cct: "", turno: "Matutino", municipio: "",
        campo: "", asig: "", grado: "", trimestre: "Primer trimestre",
        met: "Aprendizaje basado en proyectos comunitarios", contexto: "",
        pdaSeleccionados: [], ejes: [], pe: [], proyecto: "",
        docTipo: "", resultado: ""
    };

    const CAMPOS = ["Lenguajes", "Saberes y pensamiento científico", "Ética, naturaleza y sociedades", "De lo humano y lo comunitario"];
    const ASIGNATURAS = {
        "Lenguajes": ["Español", "Inglés", "Artes"],
        "Saberes y pensamiento científico": ["Matemáticas", "Biología", "Física", "Química"],
        "Ética, naturaleza y sociedades": ["Formación Cívica y Ética", "Historia", "Geografía"],
        "De lo humano y lo comunitario": ["Tutoría", "Vida saludable"]
    };
    const GRADOS = ["1", "2", "3"];
    const TRIMESTRES = ["Primer trimestre", "Segundo trimestre", "Tercer trimestre"];
    const METODOLOGIAS = ["Aprendizaje basado en proyectos comunitarios", "Aprendizaje basado en indagación", "Aprendizaje servicio"];
    const EJES = ["Inclusión", "Pensamiento crítico", "Interculturalidad crítica", "Igualdad de género", "Vida saludable"];
    const PERFILES = ["Comunica ideas con claridad", "Resuelve problemas comunitarios", "Participa con responsabilidad social"];
    const PDA_LIST = [
        "PDA 1: Desarrollo de pensamiento crítico",
        "PDA 2: Participación democrática en el aula",
        "PDA 3: Producción de textos comunitarios"
    ];

    function R() {
        const app = document.getElementById("app");
        if (!S.user) { app.innerHTML = renderLogin(); bindLogin(); return; }
        if (S.step === 1) app.innerHTML = renderStep1();
        else if (S.step === 2) app.innerHTML = renderStep2();
        else if (S.step === 3) app.innerHTML = renderStep3();
        else if (S.step === 4) app.innerHTML = renderStep4();
        else if (S.step === 5) app.innerHTML = renderStep5();
        else if (S.step === 6) app.innerHTML = renderResultado();
        bindEvents();
    }

    function renderLogin() {
        return `<div class="card"><div class="header"><h1>📘 Planeador Docente NEM</h1><p>Secundaria | Ciclo 2025-2026</p></div>
        <div class="card"><h2>🔐 Acceso docente</h2>
        <label>Usuario</label><input type="text" id="username" placeholder="maestra01">
        <label>Contraseña</label><input type="password" id="password" placeholder="123456">
        <button id="btnLogin">Ingresar</button>
        <p style="margin-top:12px;font-size:12px;">Demo: maestra01/123456 | admin/admin2025</p></div></div>`;
    }

    function bindLogin() {
        const btn = document.getElementById("btnLogin");
        if(btn) btn.onclick = () => {
            const u = document.getElementById("username").value;
            const p = document.getElementById("password").value;
            if((u === "maestra01" || u === "maestro02" || u === "maestra03") && p === "123456") {
                S.user = { nombre: u };
                S.step = 1;
                R();
            } else if(u === "admin" && p === "admin2025") {
                S.user = { nombre: "Admin" };
                S.step = 1;
                R();
            } else alert("Error: usa maestra01/123456");
        };
    }

    function renderStep1() {
        return `<div class="card"><div class="header"><h1>📌 Paso 1/5 — Escuela</h1></div>
        <label>🏫 Nombre de la escuela</label><input type="text" id="escuela" value="${S.escuela}">
        <label>📛 CCT</label><input type="text" id="cct" value="${S.cct}">
        <label>⏰ Turno</label><select id="turno">${["Matutino","Vespertino"].map(t=>`<option ${S.turno===t?"selected":""}>${t}</option>`)}</select>
        <label>📍 Municipio</label><input type="text" id="municipio" value="${S.municipio}">
        <button id="next1">Continuar →</button></div>`;
    }

    function renderStep2() {
        return `<div class="card"><div class="header"><h1>📖 Paso 2/5 — Campo y asignatura</h1></div>
        <label>🌿 Campo formativo</label><select id="campo">${CAMPOS.map(c=>`<option ${S.campo===c?"selected":""}>${c}</option>`)}</select>
        <label>📚 Asignatura</label><select id="asig">${(ASIGNATURAS[S.campo]||ASIGNATURAS["Lenguajes"]).map(a=>`<option ${S.asig===a?"selected":""}>${a}</option>`)}</select>
        <label>🎓 Grado</label><select id="grado">${GRADOS.map(g=>`<option ${S.grado===g?"selected":""}>${g}°</option>`)}</select>
        <label>📅 Trimestre</label><select id="trimestre">${TRIMESTRES.map(t=>`<option ${S.trimestre===t?"selected":""}>${t}</option>`)}</select>
        <button id="next2">Continuar →</button></div>`;
    }

    function renderStep3() {
        return `<div class="card"><div class="header"><h1>🎯 Paso 3/5 — PDA y ejes</h1></div>
        <label>📌 PDA (selecciona 2)</label>
        ${PDA_LIST.map(p=>`<div><label><input type="checkbox" value="${p}" ${S.pdaSeleccionados.includes(p)?"checked":""}> ${p}</label></div>`).join("")}
        <label>🧩 Ejes articuladores</label>
        ${EJES.map(e=>`<div><label><input type="checkbox" class="eje" value="${e}" ${S.ejes.includes(e)?"checked":""}> ${e}</label></div>`).join("")}
        <label>🎯 Perfiles de egreso</label>
        ${PERFILES.map(p=>`<div><label><input type="checkbox" class="perfil" value="${p}" ${S.pe.includes(p)?"checked":""}> ${p}</label></div>`).join("")}
        <button id="next3">Continuar →</button></div>`;
    }

    function renderStep4() {
        return `<div class="card"><div class="header"><h1>🌎 Paso 4/5 — Contexto</h1></div>
        <label>📖 Contexto comunitario</label><textarea rows="3" id="contexto">${S.contexto}</textarea>
        <label>🛠️ Metodología</label><select id="met">${METODOLOGIAS.map(m=>`<option ${S.met===m?"selected":""}>${m}</option>`)}</select>
        <label>💡 Proyecto</label><input type="text" id="proyecto" value="${S.proyecto}">
        <button id="next4">Continuar →</button></div>`;
    }

    function renderStep5() {
        return `<div class="card"><div class="header"><h1>📄 Paso 5/5 — Generar</h1></div>
        <button id="genAnalitico">📘 Programa Analítico</button>
        <button id="genDidactico">🗂️ Plano Didáctico</button>
        <button id="backStep" style="background:gray;">◀ Regresar</button></div>`;
    }

    function renderResultado() {
        return `<div class="card"><div class="header"><h1>✅ Documento generado</h1></div>
        <div class="result-area" id="textoResultado">${S.resultado || "Generando..."}</div>
        <div class="flex-btns"><button id="descargar">📎 Descargar Word</button><button id="copiar">📋 Copiar</button><button id="nuevo">🔄 Nuevo</button></div></div>`;
    }

    async function generarConGemini(datos, tipo) {
        const API_KEY = "AIzaSyDALopmFHobLJkYsyHnQdx58641IqyMwb8";
        const MODELO = "gemini-1.5-flash-8b";
        const prompt = `Genera un documento "${tipo}" para la Nueva Escuela Mexicana (Fase 6) con estos datos: ${JSON.stringify(datos)}. Incluye todos los planos y fases. Formato oficial.`;
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODELO}:generateContent?key=${API_KEY}`, {
                method: "POST", headers: {"Content-Type": "application/json"},
                body: JSON.stringify({contents: [{parts: [{text: prompt}]}], generationConfig: {maxOutputTokens: 4096}})
            });
            const data = await res.json();
            if(data.error) return "Error: " + data.error.message;
            return data.candidates?.[0]?.content?.parts?.[0]?.text || "Sin resultado";
        } catch(e) { return "Error de conexión"; }
    }

    function bindEvents() {
        if(S.step === 1) document.getElementById("next1")?.addEventListener("click", () => {
            S.escuela = document.getElementById("escuela").value;
            S.cct = document.getElementById("cct").value;
            S.turno = document.getElementById("turno").value;
            S.municipio = document.getElementById("municipio").value;
            if(!S.escuela) { alert("Escribe la escuela"); return; }
            S.step = 2; R();
        });
        if(S.step === 2) document.getElementById("next2")?.addEventListener("click", () => {
            S.campo = document.getElementById("campo").value;
            S.asig = document.getElementById("asig").value;
            S.grado = document.getElementById("grado").value.replace("°","");
            S.trimestre = document.getElementById("trimestre").value;
            S.step = 3; R();
        });
        if(S.step === 3) document.getElementById("next3")?.addEventListener("click", () => {
            S.pdaSeleccionados = Array.from(document.querySelectorAll("input[type='checkbox']:not(.eje):not(.perfil)")).filter(c=>c.checked).map(c=>c.value);
            S.ejes = Array.from(document.querySelectorAll(".eje:checked")).map(c=>c.value);
            S.pe = Array.from(document.querySelectorAll(".perfil:checked")).map(c=>c.value);
            if(S.pdaSeleccionados.length < 1) { alert("Selecciona al menos un PDA"); return; }
            S.step = 4; R();
        });
        if(S.step === 4) document.getElementById("next4")?.addEventListener("click", () => {
            S.contexto = document.getElementById("contexto").value;
            S.met = document.getElementById("met").value;
            S.proyecto = document.getElementById("proyecto").value;
            S.step = 5; R();
        });
        if(S.step === 5) {
            document.getElementById("genAnalitico")?.addEventListener("click", async () => {
                S.docTipo = "Programa Analítico Anual";
                S.step = 6; R();
                const datos = {escuela:S.escuela,asignatura:S.asig,grado:S.grado,contexto:S.contexto,metodologia:S.met,pda:S.pdaSeleccionados};
                S.resultado = await generarConGemini(datos, S.docTipo);
                R();
            });
            document.getElementById("genDidactico")?.addEventListener("click", async () => {
                S.docTipo = "Plano Didáctico";
                S.step = 6; R();
                const datos = {escuela:S.escuela,asignatura:S.asig,grado:S.grado,contexto:S.contexto};
                S.resultado = await generarConGemini(datos, S.docTipo);
                R();
            });
            document.getElementById("backStep")?.addEventListener("click", () => { if(S.step>1) S.step--; R(); });
        }
        if(S.step === 6) {
            document.getElementById("descargar")?.addEventListener("click", () => {
                const blob = new Blob([S.resultado], {type:"application/msword"});
                const a = document.createElement("a");
                a.href = URL.createObjectURL(blob);
                a.download = `${S.docTipo.replace(/\s/g,"_")}.doc`;
                a.click();
            });
            document.getElementById("copiar")?.addEventListener("click", () => { navigator.clipboard.writeText(S.resultado); alert("Copiado"); });
            document.getElementById("nuevo")?.addEventListener("click", () => { S.step=1; S.resultado=""; R(); });
        }
    }

    R();
</script>
</body>
</html>
