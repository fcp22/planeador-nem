<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Planeador Docente NEM — Fase 6 Secundaria</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--c1:#1a4a7a;--c2:#2563a8;--c3:#e8f2fc;--c4:#f0f7ff;--bg:#f4f6fa;--bgcard:#fff;--border:#d1d5db;--border2:#9ca3af;--text:#1f2937;--text2:#6b7280;--text3:#9ca3af;--ok:#15803d;--okbg:#dcfce7;--radius:10px}
body{font-family:'Segoe UI',Arial,sans-serif;font-size:15px;color:var(--text);background:var(--bg);min-height:100vh}
.app{max-width:940px;margin:0 auto;padding:16px}
.header{background:var(--c1);color:white;border-radius:var(--radius);padding:16px 22px;margin-bottom:14px;display:flex;align-items:center;gap:14px}
.header-logo{width:44px;height:44px;background:rgba(255,255,255,0.18);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.header h1{font-size:17px;font-weight:700;line-height:1.3}
.header p{font-size:12px;opacity:.8;margin-top:2px}
.card{background:var(--bgcard);border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card h2{font-size:14px;font-weight:700;color:var(--c1);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
.fg label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.05em}
.fg select,.fg input,.fg textarea{border:1px solid var(--border);border-radius:7px;padding:8px 10px;font-size:13px;background:#fff;color:var(--text);width:100%;transition:border .15s}
.fg select:focus,.fg input:focus,.fg textarea:focus{outline:none;border-color:var(--c2);box-shadow:0 0 0 3px rgba(37,99,168,.12)}
.fg textarea{min-height:72px;resize:vertical;line-height:1.5}
.btn{border:none;border-radius:7px;padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:7px}
.btn-p{background:var(--c1);color:white}.btn-p:hover{background:var(--c2)}.btn-p:disabled{opacity:.45;cursor:not-allowed}
.btn-s{background:#f9fafb;border:1px solid var(--border);color:var(--text)}.btn-s:hover{background:#f3f4f6}
.btn-g{background:var(--ok);color:white}.btn-g:hover{background:#166534}
.btn-sm{padding:6px 13px;font-size:12px}
.steps{display:flex;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);margin-bottom:16px}
.step{flex:1;padding:10px 5px;text-align:center;font-size:11px;font-weight:600;background:#f9fafb;color:var(--text2);border-right:1px solid var(--border);cursor:pointer}
.step:last-child{border-right:none}
.step.active{background:var(--c1);color:white}
.step.done{background:var(--c3);color:var(--c1)}
.pda-item{border:1px solid var(--border);border-radius:8px;padding:10px 12px;cursor:pointer;transition:all .15s;font-size:12px;line-height:1.5;margin-bottom:7px;display:flex;gap:8px;align-items:flex-start}
.pda-item:hover{border-color:var(--c2);background:var(--c4)}
.pda-item.sel{border-color:var(--c1);background:var(--c3)}
.pda-item input[type=checkbox]{margin-top:2px;accent-color:var(--c1);flex-shrink:0}
.result-area{background:#f9fafb;border:1px solid var(--border);border-radius:8px;padding:16px;white-space:pre-wrap;font-size:12px;line-height:1.75;max-height:500px;overflow-y:auto;font-family:'Courier New',monospace}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a4a7a 0%,#2563a8 100%)}
.login-box{background:white;border-radius:16px;padding:36px;width:360px;max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.login-box h1{font-size:20px;font-weight:800;color:var(--c1);margin-bottom:4px;text-align:center}
.login-box p{font-size:12px;color:var(--text2);text-align:center;margin-bottom:22px}
.err{background:#fee2e2;color:#991b1b;border-radius:7px;padding:10px 12px;font-size:12px;margin-bottom:12px}
.info-b{background:var(--c4);border:1px solid #bfdbfe;border-radius:8px;padding:11px 13px;font-size:12px;color:var(--c1);margin-bottom:12px}
.tag-g{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:var(--okbg);color:var(--ok)}
.slbl{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.prog-bar{height:4px;background:#e5e7eb;border-radius:2px;margin-bottom:14px;overflow:hidden}
.prog-fill{height:100%;background:var(--c1);border-radius:2px;transition:width .4s}
.spin{width:28px;height:28px;border:3px solid #bfdbfe;border-top-color:var(--c1);border-radius:50%;animation:spin .8s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.at{width:100%;border-collapse:collapse;font-size:12px}
.at th{background:var(--c3);color:var(--c1);padding:8px 10px;text-align:left;font-weight:700}
.at td{padding:8px 10px;border-bottom:1px solid #e5e7eb}
.at tr:hover td{background:var(--c4)}
.tab-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.tab{padding:7px 14px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);color:var(--text2);background:white}
.tab.active{background:var(--c1);color:white;border-color:var(--c1)}
.dc{border:2px solid var(--border);border-radius:9px;padding:16px;cursor:pointer;transition:all .15s;margin-bottom:10px}
.dc:hover{border-color:var(--c2);background:var(--c4)}
.dc.sel{border-color:var(--c1);background:var(--c3)}
.dc h3{font-size:13px;font-weight:700;color:var(--c1);margin-bottom:5px}
.dc p{font-size:11px;color:var(--text2);line-height:1.5}
.pe-item{display:flex;gap:7px;align-items:flex-start;font-size:11px;padding:6px 8px;border:1px solid var(--border);border-radius:6px;cursor:pointer;line-height:1.4;margin-bottom:5px}
.pe-item.sel{background:var(--c3);border-color:var(--c1)}
.pe-item input{margin-top:1px;accent-color:var(--c1);flex-shrink:0}
.eje-p{display:inline-flex;gap:5px;align-items:center;font-size:11px;padding:5px 10px;border:1px solid var(--border);border-radius:20px;cursor:pointer;background:white;margin:3px}
.eje-p.sel{background:var(--c3);border-color:var(--c1);color:var(--c1)}
.eje-p input{accent-color:var(--c1)}
.divider{height:1px;background:var(--border);margin:14px 0}
@media(max-width:600px){.fr,.fr3{grid-template-columns:1fr}.steps{flex-direction:column}.step{border-right:none;border-bottom:1px solid var(--border)}.header h1{font-size:14px}}
</style>
</head>
